<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Sunflower Memory 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #fdfcf0;
            font-family: 'Prompt', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #status-text { 
            color: #5d4037; font-size: 1.1rem; margin-bottom: 20px; 
            z-index: 10; pointer-events: none; 
            background: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 25px;
            transition: opacity 0.5s;
        }

        #touch-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: pointer;
        }

        #plant-container {
            width: 280px; height: 400px;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative; z-index: 2; 
        }

        #main-plant-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #nong-img {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100px; height: auto;
            cursor: pointer; z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
        #nong-img.show { transform: translate(-50%, -50%) scale(1); animation: float 2s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
        }

        #watering-can-img {
            position: fixed; width: 80px; height: 80px;
            pointer-events: none; display: none; z-index: 20;
            transform: rotate(-20deg);
        }

        /* สไตล์โพลาลอยด์จิ๋วแบบกระจัดกระจาย */
        .polaroid-small {
            position: absolute; width: 65px; padding: 4px 4px 12px 4px;
            background: white; border: 1px solid #eee;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            top: 50%; left: 50%;
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1; cursor: pointer; pointer-events: auto;
        }
        .polaroid-small img { width: 100%; display: block; filter: sepia(0.2); }

        /* หน้าต่างดูรูปขยายกลางจอ */
        #photo-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 200;
            flex-direction: column;
        }
        .polaroid-large {
            width: 85%; max-width: 300px;
            background: white; padding: 12px 12px 35px 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transform: rotate(-1deg); animation: popUp 0.3s ease-out;
        }
        @keyframes popUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .polaroid-large img { width: 100%; margin-bottom: 10px; }
        .polaroid-caption { text-align: center; color: #444; font-weight: 600; font-size: 1rem; border-top: 1px solid #f0f0f0; padding-top: 8px; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 300;
        }
        .letter-content { background: white; padding: 30px; border-radius: 20px; max-width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div id="touch-area"></div>
    <h1 id="status-text">รดน้ำให้ต้นไม้โตกัน (0/100)</h1>

    <div id="plant-container">
        <img id="main-plant-img" src="stage1.png" alt="plant">
        <img id="nong-img" src="nong.png" alt="nong-mystery">
    </div>

    <img id="watering-can-img" src="water-can.png" alt="watering-can">

    <div id="photo-viewer" onclick="this.style.display='none'">
        <div class="polaroid-large">
            <img id="view-img" src="" alt="full-photo">
            <div id="view-caption" class="polaroid-caption"></div>
        </div>
        <p style="color: white; margin-top: 15px; font-size: 0.9rem;">แตะที่ว่างเพื่อปิด</p>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="letter-content">
            <h2 style="color: #e67e22;">ถึงคนเก่งของเค้า 🌻</h2>
            <p>ขอบคุณที่ดูแลความรักของเราให้บานสะพรั่งนะ</p>
            <p><b>"รักที่สุดเลยครับ"</b></p>
        </div>
    </div>

    <script>
        let count = 0;
        let isComplete = false;
        const statusText = document.getElementById('status-text');
        const plantImg = document.getElementById('main-plant-img');
        const waterCan = document.getElementById('watering-can-img');
        const touchArea = document.getElementById('touch-area');
        const nongImg = document.getElementById('nong-img');
        const plantContainer = document.getElementById('plant-container');
        
        // แก้ไขข้อความใต้รูปภาพที่นี่ครับ
        const captions = [
            "รอยยิ้มของคุณคือความสุขของฉัน", "วันแรกที่พบกัน", "ขอบคุณที่อยู่ข้างกัน", 
            "รักคุณมากกว่าเมื่อวาน", "ความทรงจำที่แสนพิเศษ", "จะกี่ปีก็ยังเป็นคุณ", 
            "มือที่กุมไว้อย่าปล่อยนะ", "ของขวัญที่ดีที่สุดคือคุณ", "หัวใจดวงนี้ให้คุณ", "รักที่สุดเลยครับ"
        ];

        function updatePlant(c) {
            if (c < 10) plantImg.src = 'stage1.png';
            else if (c < 30) plantImg.src = 'stage2.png';
            else if (c < 50) plantImg.src = 'stage3.png';
            else if (c < 75) plantImg.src = 'stage4.png';
            else if (c < 100) plantImg.src = 'stage5.png';
            else {
                plantImg.src = 'stage6.png';
                statusText.innerText = "บานแล้ว! ลองกดที่น้องดูสิ";
                isComplete = true;
                
                // เอารดน้ำออกทันทีที่ครบ 100
                touchArea.style.display = "none";
                waterCan.style.display = "none";
                
                setTimeout(() => {
                    nongImg.classList.add('show');
                }, 500);

                nongImg.onclick = startHarvest;
            }
        }

        touchArea.addEventListener('pointerdown', (e) => {
            if (isComplete) return;
            count++;
            statusText.innerText = `รดน้ำให้ต้นไม้โตกัน (${count}/100)`;
            updatePlant(count);

            waterCan.style.display = "block";
            waterCan.style.left = (e.clientX - 40) + "px";
            waterCan.style.top = (e.clientY - 40) + "px";
            
            plantImg.style.transform = "scale(1.05)";
            setTimeout(() => { plantImg.style.transform = "scale(1)"; }, 50);
        });

        touchArea.addEventListener('pointerup', () => {
            if(!isComplete) waterCan.style.display = "none";
        });

        function startHarvest() {
            // ทรานซิซั่นของน้องก่อนหายไป
            nongImg.style.transform = "translate(-50%, -50%) scale(1.5)";
            nongImg.style.opacity = "0";
            
            setTimeout(() => {
                nongImg.style.display = "none";
                // ทรานซิซั่นเปลี่ยนเป็นช่อดอกไม้
                plantImg.style.opacity = "0";
                setTimeout(() => {
                    plantImg.src = 'bouquet.png';
                    plantImg.style.opacity = "1";
                    plantImg.style.transform = "scale(0.85)"; 
                    statusText.innerText = "แตะที่ช่อเพื่อกระจายความทรงจำ";
                    
                    plantContainer.style.pointerEvents = "auto";
                    plantContainer.onclick = explode;
                }, 300);
            }, 400);
        }

        function explode() {
            statusText.style.opacity = "0";
            plantContainer.onclick = null;

            // กระจายรูปโพลาลอยด์แบบสุ่ม (ไม่เป็นระเบียบ)
            for (let i = 1; i <= 10; i++) {
                const pol = document.createElement('div');
                pol.className = 'polaroid-small';
                pol.innerHTML = `<img src="photo${i}.jpg" onerror="this.src='https://via.placeholder.com/150'">`;
                
                pol.onclick = (e) => {
                    e.stopPropagation();
                    showPhoto(`photo${i}.jpg`, captions[i-1]);
                };
                spawnRandomEffect(pol);
            }

            // จดหมาย
            const letter = document.createElement('div');
            letter.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:55px; height:40px; background:white; border:2px solid #ffccbc; border-radius:5px; display:flex; justify-content:center; align-items:center; z-index:5; cursor:pointer; font-size:1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);";
            letter.innerHTML = "✉️";
            letter.onclick = (e) => {
                e.stopPropagation();
                document.getElementById('overlay').style.display = 'flex';
            };
            spawnRandomEffect(letter);
        }

        function showPhoto(src, caption) {
            document.getElementById('view-img').src = src;
            document.getElementById('view-caption').innerText = caption;
            document.getElementById('photo-viewer').style.display = 'flex';
        }

        function spawnRandomEffect(el) {
            document.body.appendChild(el);
            // สุ่มตำแหน่งกระจายตัว
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * (window.innerWidth / 2.5) + 80;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            const rotate = (Math.random() * 60) - 30; // สุ่มการหมุน -30 ถึง 30 องศา

            setTimeout(() => {
                el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${rotate}deg)`;
            }, 50);
        }
    </script>
</body>
</html>
