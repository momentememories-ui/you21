<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- ป้องกันการซูมหน้าจอเพื่อให้จิ้มรัวๆ ได้ลื่นไหล -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Memory Sunflower 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf0;
            --soil-brown: #8d6e63;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; text-align: center;
            /* ป้องกันการเลือกข้อความและซูม */
            touch-action: manipulation;
            user-select: none;
        }

        .game-container { position: relative; width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; justify-content: center; }

        h1 { color: #5d4037; font-size: 1.1rem; margin-top: 20px; z-index: 10; pointer-events: none; }

        /* พื้นที่จิ้มรดน้ำ (เต็มหน้าจอ) */
        #touch-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: crosshair;
        }

        #plant-display {
            width: 300px; height: 400px; margin: 0 auto;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative; z-index: 1; pointer-events: none;
        }

        /* บัวรดน้ำที่จะโผล่มาตอนจิ้ม */
        #watering-can {
            position: fixed; width: 80px; height: 80px;
            pointer-events: none; display: none; z-index: 20;
            transform: rotate(-20deg);
        }

        .hidden { display: none !important; }

        /* รูปภาพความทรงจำ */
        .pop-item {
            position: absolute; width: 110px; height: 110px;
            border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            object-fit: cover; border-radius: 12px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 25; cursor: pointer; pointer-events: auto;
        }

        .letter-pop {
            position: absolute; width: 90px; height: 60px;
            background: #fff3e0; border: 2px solid #ffab91;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            border-radius: 5px; cursor: pointer; z-index: 26;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.8s ease-out; font-size: 1.5rem; pointer-events: auto;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        .letter-box { background: white; padding: 30px; border-radius: 20px; max-width: 80%; }
    </style>
</head>
<body>

    <div id="touch-area"></div>

    <div class="game-container">
        <h1 id="status-text">จิ้มที่หน้าจอเพื่อรดน้ำ (0/100)</h1>
        
        <div id="plant-display">
            <svg id="plant-svg" width="300" height="400" viewBox="0 0 200 250">
                <!-- กระถาง -->
                <path d="M70 230 L130 230 L145 180 L55 180 Z" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
                <rect x="50" y="170" width="100" height="12" rx="2" fill="#d35400" />
                
                <!-- ต้นไม้ -->
                <g id="growth-layer"></g>
            </svg>
        </div>
    </div>

    <!-- บัวรดน้ำ SVG -->
    <svg id="watering-can" viewBox="0 0 100 100">
        <path d="M30 40 H70 V70 H30 Z" fill="#4fc3f7" />
        <path d="M70 50 L90 40 L95 45 L75 55" fill="#4fc3f7" />
        <path d="M30 45 Q10 45 10 55 Q10 65 30 65" fill="none" stroke="#4fc3f7" stroke-width="5" />
        <path d="M85 45 L90 60 M80 47 L85 62 M90 43 L95 58" stroke="white" stroke-width="2" opacity="0.7" id="water-drops" />
    </svg>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="letter-box">
            <h2>ถึงคนพิเศษ 🌻</h2>
            <p>ความรักของเราโตขึ้นเหมือนทานตะวันต้นนี้เลยนะ</p>
            <p>ขอบคุณที่รดน้ำพรวนดินหัวใจให้กันเสมอ รักที่สุด!</p>
        </div>
    </div>

    <script>
        let count = 0;
        let isComplete = false;
        const layer = document.getElementById('growth-layer');
        const status = document.getElementById('status-text');
        const touchArea = document.getElementById('touch-area');
        const waterCan = document.getElementById('watering-can');

        // ฟังก์ชันวาด 6 ระยะตามรูปตัวอย่าง
        function drawPlant(c) {
            layer.innerHTML = "";
            if (c < 5) { // ระยะ 1: เมล็ด
                layer.innerHTML = `<ellipse cx="100" cy="175" rx="6" ry="4" fill="#3e2723" />`;
            } else if (c < 20) { // ระยะ 2: เริ่มงอก
                layer.innerHTML = `
                    <path d="M100 175 Q105 165 110 160" stroke="#8bc34a" stroke-width="3" fill="none" />
                    <ellipse cx="112" cy="158" rx="5" ry="3" fill="#8bc34a" transform="rotate(-30 112 158)" />
                `;
            } else if (c < 45) { // ระยะ 3: ใบเลี้ยงคู่
                layer.innerHTML = `
                    <path d="M100 175 L100 150" stroke="#4caf50" stroke-width="3" fill="none" />
                    <ellipse cx="90" cy="150" rx="10" ry="5" fill="#8bc34a" transform="rotate(-20 90 150)" />
                    <ellipse cx="110" cy="150" rx="10" ry="5" fill="#8bc34a" transform="rotate(20 110 150)" />
                `;
            } else if (c < 70) { // ระยะ 4: ลำต้นเริ่มสูง
                layer.innerHTML = `
                    <path d="M100 175 L100 100" stroke="#4caf50" stroke-width="4" fill="none" />
                    <ellipse cx="88" cy="140" rx="12" ry="6" fill="#4caf50" transform="rotate(-30 88 140)" />
                    <ellipse cx="112" cy="120" rx="12" ry="6" fill="#4caf50" transform="rotate(30 112 120)" />
                `;
            } else if (c < 100) { // ระยะ 5: ดอกตูมสีเขียว
                layer.innerHTML = `
                    <path d="M100 175 L100 70" stroke="#2e7d32" stroke-width="5" fill="none" />
                    <circle cx="100" cy="70" r="15" fill="#689f38" stroke="#33691e" stroke-width="2" />
                    <path d="M100 55 L100 85 M85 70 L115 70" stroke="#33691e" stroke-width="1" opacity="0.5" />
                `;
            } else { // ระยะ 6: บานสะพรั่ง
                let petals = "";
                for(let i=0; i<16; i++) {
                    petals += `<ellipse cx="100" cy="30" rx="30" ry="10" fill="#fbc02d" transform="rotate(${i*22.5} 100 70)" />`;
                }
                layer.innerHTML = `
                    <path d="M100 175 L100 70" stroke="#2e7d32" stroke-width="5" fill="none" />
                    ${petals}
                    <circle cx="100" cy="70" r="22" fill="#3e2723" stroke="#5d4037" stroke-width="3" />
                `;
            }
        }

        drawPlant(0);

        // ระบบรดน้ำเมื่อจิ้มหน้าจอ
        touchArea.addEventListener('pointerdown', (e) => {
            if (isComplete) return;

            count++;
            status.innerText = `จิ้มที่หน้าจอเพื่อรดน้ำ (${count}/100)`;
            drawPlant(count);

            // แสดงบัวรดน้ำตามตำแหน่งนิ้ว
            waterCan.style.display = "block";
            waterCan.style.left = (e.clientX - 40) + "px";
            waterCan.style.top = (e.clientY - 40) + "px";

            // สั่นเล็กน้อย (เฉพาะมือถือที่รองรับ)
            if (navigator.vibrate) navigator.vibrate(10);

            if (count >= 100) {
                isComplete = true;
                status.innerText = "ทานตะวันบานแล้ว! แตะที่ดอกไม้เพื่อเก็บเกี่ยว";
                waterCan.style.display = "none";
                document.body.style.backgroundColor = "#fffde7";
                
                // เปิดให้คลิกที่ SVG เพื่อระเบิดรางวัล
                const svgElement = document.getElementById('plant-svg');
                svgElement.style.pointerEvents = "auto";
                svgElement.onclick = explode;
            }
        });

        touchArea.addEventListener('pointerup', () => {
            setTimeout(() => { if(!isComplete) waterCan.style.display = "none"; }, 200);
        });

        function explode() {
            status.innerText = "ช่อดอกไม้แห่งความทรงจำ 💐";
            drawPlant(999); // วาดระยะสุดท้าย
            
            for (let i = 1; i <= 10; i++) {
                const img = document.createElement('img');
                img.src = `photo${i}.jpg`;
                img.className = 'pop-item';
                img.onerror = () => { img.style.background = "#ffd54f"; };
                launch(img);
            }

            const letter = document.createElement('div');
            letter.className = 'letter-pop';
            letter.innerHTML = "✉️";
            letter.onclick = (e) => {
                e.stopPropagation();
                document.getElementById('overlay').style.display = 'flex';
            };
            launch(letter);
            
            document.getElementById('plant-svg').onclick = null;
        }

        function launch(el) {
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const dist = window.innerWidth > 500 ? 220 : 150;
            const x = Math.cos(angle) * dist;
            const y = Math.sin(angle) * dist;

            setTimeout(() => {
                el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${Math.random()*40-20}deg)`;
            }, 50);
        }
    </script>
</body>
</html>
