<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Garden 🌻🦋</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #fdfcf0;
            font-family: 'Prompt', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            position: relative;
        }

        /* ผีเสื้อบินวน */
        .butterfly {
            position: absolute; width: 20px; height: 20px;
            pointer-events: none; z-index: 1; font-size: 20px;
            animation: flying 12s linear infinite;
        }
        @keyframes flying {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(400px, -500px) rotate(360deg); opacity: 0; }
        }

        /* ตัวหนังสือแบบไม่มีแถบขาว */
        #status-text { 
            color: #5d4037; font-size: 1rem; margin-bottom: 20px; 
            z-index: 10; text-align: center; width: 85%;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); /* ช่วยให้อ่านง่ายขึ้นบนพื้นหลัง */
            font-weight: 600;
        }

        #plant-container {
            width: 280px; height: 380px;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative; z-index: 5; 
        }

        #main-plant-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* แอนิเมชันเด้งๆ สำหรับช่อดอกไม้ */
        .bounce-bouquet {
            animation: bouquetFloat 2s ease-in-out infinite;
        }
        @keyframes bouquetFloat {
            0%, 100% { transform: scale(1.35) translateY(0); }
            50% { transform: scale(1.4) translateY(-15px); }
        }

        #nong-img {
            position: absolute; 
            bottom: 55%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80px; height: auto;
            cursor: pointer; z-index: 15; opacity: 0;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #nong-img.show { 
            opacity: 1;
            transform: translate(60px, -60px) scale(1);
            animation: floatingNong 2s ease-in-out infinite alternate;
        }
        @keyframes floatingNong {
            from { transform: translate(60px, -60px) scale(1); }
            to { transform: translate(65px, -75px) scale(1.05); }
        }

        .memory-seed {
            position: absolute;
            width: 50px; height: 50px; 
            padding: 3px; background: white;
            border: 1px solid #eee;
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
            top: 50%; left: 50%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 60; 
            cursor: pointer; pointer-events: auto;
            object-fit: cover;
            border-radius: 4px;
            animation: bounceSeed 3s ease-in-out infinite;
        }

        @keyframes bounceSeed {
            0%, 100% { margin-top: 0; transform: translate(-50%, -50%) scale(1); }
            50% { margin-top: -12px; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* ปรับขนาดการดูรูปให้เล็กลงไม่ล้นจอ */
        #photo-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 300;
        }
        .view-card {
            width: 75%; max-width: 260px; /* ลดขนาดลงเพื่อความพอดี */
            background: white; padding: 10px 10px 20px 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popNormal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popNormal { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .view-card img { width: 100%; height: auto; display: block; margin-bottom: 12px; border-radius: 2px; }
        .view-caption { text-align: center; color: #444; font-size: 0.85rem; font-weight: 600; }

        #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; cursor: pointer; }
        #watering-can-img { position: fixed; width: 80px; height: 80px; pointer-events: none; display: none; z-index: 100; transform: rotate(-20deg); }

        /* เปลี่ยนซองจดหมายเป็น box.png */
        #box-btn {
            position: absolute; top: 50%; left: 50%; 
            width: 60px; height: auto;
            z-index: 100; cursor: pointer; 
            transform: translate(-50%, -50%) scale(0);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: bounceSeed 2.5s ease-in-out infinite;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 400;
        }
        /* เปลี่ยนจดหมายเป็นไฟล์ note.png */
        #note-img-display {
            width: 85%; max-width: 320px;
            height: auto;
            animation: popNormal 0.5s ease-out;
        }
    </style>
</head>
<body>

    <h1 id="status-text">แตะหน้าจอเพื่อรดน้ำให้เค้าหน่อยนะ 🌻</h1>

    <div id="plant-container">
        <img id="main-plant-img" src="stage1.png">
        <img id="nong-img" src="nong.png">
    </div>

    <div id="touch-area"></div>
    <img id="watering-can-img" src="water-can.png">

    <!-- เปลี่ยนซองจดหมายเป็น box.png -->
    <img id="box-btn" src="box.png" onclick="openNote()">

    <div id="photo-viewer" onclick="this.style.display='none'">
        <div class="view-card" onclick="event.stopPropagation()">
            <img id="view-img" src="">
            <div id="view-caption" class="view-caption"></div>
        </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <img id="note-img-display" src="note.png">
    </div>

    <script>
        function createButterflies() {
            const emojis = ['🦋', '🌸', '✨'];
            for(let i=0; i<12; i++) {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                b.style.left = Math.random() * 90 + 'vw';
                b.style.top = Math.random() * 90 + 'vh';
                b.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(b);
            }
        }
        createButterflies();

        let count = 0;
        let isComplete = false;
        const captions = ["จุดเริ่มต้นความทรงจำ", "รอยยิ้มที่แสนพิเศษ", "ขอบคุณที่อยู่ข้างกัน", "วันที่มีความสุขที่สุด", "เม็ดความรักเล็กๆ", "ใจฟูทุกครั้งที่มอง", "เติบโตไปด้วยกันนะ", "คนเก่งของเค้า", "เจ้าของรอยยิ้มนี้", "รักที่สุดเลยครับ"];

        const statusText = document.getElementById('status-text');
        const plantImg = document.getElementById('main-plant-img');
        const waterCan = document.getElementById('watering-can-img');
        const touchArea = document.getElementById('touch-area');
        const nongImg = document.getElementById('nong-img');
        const plantContainer = document.getElementById('plant-container');
        const boxBtn = document.getElementById('box-btn');

        touchArea.addEventListener('pointerdown', (e) => {
            if (isComplete) return;
            count++;
            statusText.innerText = `รดน้ำกันเถอะ (${count}%)`;
            
            if(count === 20) plantImg.src = 'stage2.png';
            if(count === 40) plantImg.src = 'stage3.png';
            if(count === 60) plantImg.src = 'stage4.png';
            if(count === 80) plantImg.src = 'stage5.png';
            
            if(count >= 100) {
                plantImg.src = 'stage6.png';
                isComplete = true;
                waterCan.remove();
                touchArea.remove();
                setTimeout(() => { 
                    nongImg.classList.add('show'); 
                    statusText.innerText = "ลองกดดูสิ... อะไรน้าา?"; 
                }, 800);
            } else {
                waterCan.style.display = "block";
                waterCan.style.left = (e.clientX - 40) + "px";
                waterCan.style.top = (e.clientY - 40) + "px";
                plantImg.style.transform = "scale(1.05)";
                setTimeout(() => plantImg.style.transform = "scale(1)", 50);
            }
        });

        touchArea.addEventListener('pointerup', () => { if(waterCan) waterCan.style.display = "none"; });

        nongImg.onclick = () => {
            nongImg.style.transform = "translate(150px, -200px) scale(0)";
            nongImg.style.opacity = "0";
            setTimeout(() => {
                plantImg.src = 'bouquet.png';
                plantImg.style.transform = "scale(1.35)";
                plantImg.classList.add('bounce-bouquet'); // เพิ่มเด้งๆ ตลอดเวลา
                statusText.innerText = "แตะที่ช่อดอกไม้สิ!";
                setTimeout(() => {
                    plantContainer.style.pointerEvents = "auto";
                    plantContainer.onclick = explode;
                }, 500);
            }, 400);
        };

        function explode() {
            statusText.style.opacity = "0";
            plantContainer.onclick = null;

            for (let i = 0; i < 10; i++) {
                const img = document.createElement('img');
                img.src = `photo${i+1}.jpg`;
                img.className = 'memory-seed';
                img.onerror = function() { this.src = 'https://via.placeholder.com/60'; };
                
                img.onclick = (e) => { e.stopPropagation(); showPhoto(img.src, captions[i]); };
                document.body.appendChild(img);
                
                const angle = Math.random() * Math.PI * 2; 
                const dist = 140 + (Math.random() * 60); 
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;
                const rotate = (Math.random() - 0.5) * 40; 

                setTimeout(() => {
                    img.style.left = `calc(50% + ${x}px)`;
                    img.style.top = `calc(50% + ${y}px)`;
                    img.style.transform = `translate(-50%, -50%) rotate(${rotate}deg) scale(1)`;
                    img.style.animationDelay = (Math.random() * 2) + "s";
                }, i * 60);
            }

            // แสดง box.png
            setTimeout(() => {
                boxBtn.style.left = "50%";
                boxBtn.style.top = "calc(50% + 220px)";
                boxBtn.style.transform = "translate(-50%, -50%) scale(1)";
            }, 600);
        }

        function showPhoto(src, text) {
            document.getElementById('view-img').src = src;
            document.getElementById('view-caption').innerText = text;
            document.getElementById('photo-viewer').style.display = 'flex';
        }

        function openNote() {
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
