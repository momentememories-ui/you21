<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Garden 🌻🦋</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #fdfcf0;
            font-family: 'Prompt', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            position: relative;
        }

        /* พื้นหลังผีเสื้อ */
        .butterfly {
            position: absolute; width: 20px; height: 20px;
            pointer-events: none; z-index: 1;
            font-size: 20px;
            animation: flying 10s linear infinite;
        }
        @keyframes flying {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(400px, -500px) rotate(360deg); opacity: 0; }
        }

        #status-text { 
            color: #5d4037; font-size: 0.9rem; margin-bottom: 20px; 
            z-index: 10; background: rgba(255,255,255,0.85); 
            padding: 10px 20px; border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center; width: 80%;
        }

        #plant-container {
            width: 250px; height: 350px;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative; z-index: 5; 
        }

        #main-plant-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #nong-img {
            position: absolute; 
            bottom: 55%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80px; height: auto;
            cursor: pointer; z-index: 15; opacity: 0;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #nong-img.show { 
            opacity: 1;
            transform: translate(60px, -60px) scale(1);
            animation: pulseNong 2s ease-in-out infinite alternate;
        }
        @keyframes pulseNong {
            from { transform: translate(60px, -60px) scale(1); }
            to { transform: translate(65px, -70px) scale(1.1); }
        }

        /* เม็ดรูปภาพ: ปรับขนาดและเงาให้กดง่ายขึ้น */
        .memory-seed {
            position: absolute;
            width: 45px; height: 45px; 
            padding: 3px; background: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            top: 50%; left: 50%;
            transition: all 1s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 50; 
            cursor: pointer; pointer-events: auto;
            object-fit: cover;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 4px;
        }

        /* ปรับขนาดการดูรูปไม่ให้ล้นจอ */
        #photo-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 300;
        }
        .view-card {
            width: 85%; /* ปรับขนาดความกว้างไม่ให้ล้น */
            max-width: 300px;
            background: white; padding: 12px 12px 25px 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popNormal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popNormal { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .view-card img { width: 100%; height: auto; display: block; margin-bottom: 12px; border-radius: 2px; }
        .view-caption { text-align: center; color: #444; font-size: 0.9rem; font-weight: 600; line-height: 1.4; }

        #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; cursor: pointer; }
        #watering-can-img { position: fixed; width: 80px; height: 80px; pointer-events: none; display: none; z-index: 100; transform: rotate(-20deg); }

        .pulse-bouquet { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 400;
        }
        .letter { background: white; padding: 30px; border-radius: 20px; max-width: 80%; text-align: center; }
    </style>
</head>
<body>

    <h1 id="status-text">แตะหน้าจอเพื่อรดน้ำให้เค้าหน่อยนะ 🌻</h1>

    <div id="plant-container">
        <img id="main-plant-img" src="stage1.png">
        <img id="nong-img" src="nong.png">
    </div>

    <div id="touch-area"></div>
    <img id="watering-can-img" src="water-can.png">

    <div id="photo-viewer" onclick="this.style.display='none'">
        <div class="view-card" onclick="event.stopPropagation()">
            <img id="view-img" src="">
            <div id="view-caption" class="view-caption"></div>
            <p style="text-align:center; font-size:0.7rem; color:#aaa; margin-top:15px;">แตะที่ว่างเพื่อปิด</p>
        </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="letter">
            <h2 style="color:#e67e22; margin-top:0;">Happy Anniversary!</h2>
            <p>ยินดีที่ได้เติบโตไปพร้อมๆ กันนะ</p>
            <p><b>"รักคุณที่สุด"</b></p>
        </div>
    </div>

    <script>
        function createButterflies() {
            const emojis = ['🦋', '🌸', '✨'];
            for(let i=0; i<12; i++) {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                b.style.left = Math.random() * 90 + 'vw';
                b.style.top = Math.random() * 90 + 'vh';
                b.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(b);
            }
        }
        createButterflies();

        let count = 0;
        let isComplete = false;
        const statusText = document.getElementById('status-text');
        const plantImg = document.getElementById('main-plant-img');
        const waterCan = document.getElementById('watering-can-img');
        const touchArea = document.getElementById('touch-area');
        const nongImg = document.getElementById('nong-img');
        const plantContainer = document.getElementById('plant-container');

        const captions = ["จุดเริ่มต้นความทรงจำ", "รอยยิ้มที่แสนพิเศษ", "ขอบคุณที่อยู่ข้างกัน", "วันที่มีความสุขที่สุด", "เม็ดความรักเล็กๆ", "ใจฟูทุกครั้งที่มอง", "เติบโตไปด้วยกันนะ", "คนเก่งของเค้า", "เจ้าของรอยยิ้มนี้", "รักที่สุดเลยครับ"];

        function getMsg(c) {
            if (c < 10) return `ขอบคุณนะ! รดต่ออีกนิด (${c}%)`;
            if (c < 50) return `น้องเริ่มโตแล้วนะ (${c}%)`;
            if (c < 100) return `ใกล้จะบานแล้วล่ะ (${c}%)`;
            return "บานสะพรั่งแล้ว!";
        }

        touchArea.addEventListener('pointerdown', (e) => {
            if (isComplete) return;
            count++;
            statusText.innerText = getMsg(count);
            
            if(count === 20) plantImg.src = 'stage2.png';
            if(count === 40) plantImg.src = 'stage3.png';
            if(count === 60) plantImg.src = 'stage4.png';
            if(count === 80) plantImg.src = 'stage5.png';
            
            if(count >= 100) {
                plantImg.src = 'stage6.png';
                isComplete = true;
                waterCan.remove();
                touchArea.remove();
                setTimeout(() => {
                    nongImg.classList.add('show');
                    statusText.innerText = "ลองกดดูสิ... อะไรน้าา?";
                }, 800);
            } else {
                waterCan.style.display = "block";
                waterCan.style.left = (e.clientX - 40) + "px";
                waterCan.style.top = (e.clientY - 40) + "px";
                plantImg.style.transform = "scale(1.05)";
                setTimeout(() => plantImg.style.transform = "scale(1)", 50);
            }
        });

        touchArea.addEventListener('pointerup', () => { 
            const can = document.getElementById('watering-can-img');
            if(can) can.style.display = "none"; 
        });

        nongImg.onclick = () => {
            nongImg.style.transform = "translate(200px, -300px) scale(0)";
            nongImg.style.opacity = "0";
            setTimeout(() => {
                plantImg.style.transition = "all 0.6s cubic-bezier(0.68, -0.6, 0.32, 2.5)";
                plantImg.src = 'bouquet.png';
                plantImg.style.transform = "scale(1.3)";
                statusText.innerText = "แตะที่ช่อดอกไม้เพื่อดูรูปนะ";
                setTimeout(() => {
                    plantImg.style.transform = "scale(1)";
                    plantImg.classList.add('pulse-bouquet');
                    plantContainer.style.pointerEvents = "auto";
                    plantContainer.onclick = explode;
                }, 400);
            }, 300);
        };

        function explode() {
            statusText.style.opacity = "0";
            plantContainer.classList.remove('pulse-bouquet');
            plantContainer.onclick = null;
            
            // ย่อช่อดอกไม้ลงเพื่อไม่ให้บังรูปตอนกระจาย
            plantImg.style.transform = "scale(0.6) translateY(40px)";

            const totalPhotos = 10;
            const radius = 145; // รัศมีวงกลมที่รูปจะกระจายตัวออกไป

            for (let i = 0; i < totalPhotos; i++) {
                const img = document.createElement('img');
                img.src = `photo${i+1}.jpg`;
                img.className = 'memory-seed';
                img.onerror = function() { this.src = 'https://via.placeholder.com/60'; };
                
                img.onclick = (e) => {
                    e.stopPropagation();
                    showPhoto(img.src, captions[i]);
                };
                
                document.body.appendChild(img);
                
                // คำนวณตำแหน่งแบบวงกลมเป๊ะๆ ไม่ให้ทับกัน
                const angle = (i / (totalPhotos / 2)) * Math.PI; 
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                setTimeout(() => {
                    img.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1) rotate(${(Math.random()-0.5)*15}deg)`;
                }, 100 * i);
            }

            // ปุ่มจดหมายลอยมาด้านล่างสุด
            const btn = document.createElement('div');
            btn.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50px; height:40px; background:#fff; border:1px solid #ffccbc; display:flex; justify-content:center; align-items:center; z-index:100; cursor:pointer; font-size:1.3rem; box-shadow:0 5px 15px rgba(0,0,0,0.1); transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius:8px;";
            btn.innerHTML = "✉️";
            btn.onclick = () => document.getElementById('overlay').style.display = 'flex';
            document.body.appendChild(btn);
            setTimeout(() => btn.style.transform = "translate(calc(-50% + 0px), calc(-50% + 200px))", 500);
        }

        function showPhoto(src, text) {
            document.getElementById('view-img').src = src;
            document.getElementById('view-caption').innerText = text;
            document.getElementById('photo-viewer').style.display = 'flex';
        }
    </script>
</body>
</html>
